name: Publish GitHub Pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.25.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        env:
          BASE_PATH: /
        run: pnpm build

      - name: Publish gh-pages branch
        run: |
          set -euo pipefail
          touch dist/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          rm -rf /tmp/chronicle-wiki-pages
          mkdir -p /tmp/chronicle-wiki-pages
          cp -a dist/. /tmp/chronicle-wiki-pages/
          git checkout --orphan gh-pages-worktree
          git rm -rf . >/dev/null 2>&1 || true
          cp -a /tmp/chronicle-wiki-pages/. .
          git add .
          git commit -m "deploy: publish GitHub Pages artifact"
          git push -f origin HEAD:gh-pages
